version: '3.8'

services:
  api:
    image: ghcr.io/vivienke/ghcn-temperature-api:latest
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1  
    environment:
      CACHE_DIR: /cache
      METADATA_TTL_SEC: 604800
      STATION_TTL_SEC: 2592000
      STATION_CACHE_LIMIT: 5
      HTTP_TIMEOUT_SEC: 60
    volumes:
      - cache:/cache
    restart: unless-stopped

  frontend:
    image: ghcr.io/alisamandaceaca/ghcn-temperature-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  cache: